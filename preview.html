<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SorobanFlow Preview</title>
    <style>
        :root {
            --bg: #020617;
            --card-bg: rgba(255, 255, 255, 0.05);
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding: 10px 0; }
        .logo { font-size: 24px; font-weight: 900; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 20px; font-size: 14px; color: var(--text-dim); }
        .main-grid { display: block; }
        @media (min-width: 900px) {
            .main-grid { display: flex; gap: 30px; }
            .sidebar { width: 320px; flex-shrink: 0; }
            .content { flex-grow: 1; }
        }
        .card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .label { font-size: 11px; font-weight: bold; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .value { font-size: 28px; font-weight: 900; }
        .unit { font-size: 14px; font-weight: normal; color: var(--text-dim); }
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; }
        .tab { padding-bottom: 10px; font-weight: bold; color: var(--text-dim); border-bottom: 2px solid transparent; cursor: pointer; }
        .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
        .form-group { margin-bottom: 25px; }
        .input-box { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .input-box input { background: none; border: none; color: white; font-size: 24px; font-weight: bold; outline: none; width: 150px; }
        .token { font-weight: bold; color: var(--text-dim); }
        .btn { width: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); border: none; border-radius: 12px; padding: 18px; color: white; font-size: 16px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .activity-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">SOROBANFLOW</div>
            <div class="nav-links">
                <span>Swap</span>
                <span>Pools</span>
                <span>Governance</span>
            </div>
        </header>

        <div class="main-grid">
            <div class="sidebar">
                <div class="card">
                    <div class="label">Total XLM Balance</div>
                    <div class="value">1,240.50 <span class="unit">XLM</span></div>
                </div>
                <div class="card">
                    <div class="label">S-FLOW Tokens</div>
                    <div class="value">500.00 <span class="unit">SFL</span></div>
                </div>
                <div class="card">
                    <div class="label">Recent Activity</div>
                    <div class="activity-item">Swap: 50 XLM → 44 SFL</div>
                    <div class="activity-item">Stake: +100 SFL</div>
                    <div class="activity-item">Withdraw: 20 XLM</div>
                </div>
            </div>

            <div class="content">
                <div class="card">
                    <div class="tabs">
                        <div class="tab active">SWAP</div>
                        <div class="tab">LIQUIDITY</div>
                    </div>
                    
                    <div class="form-group">
                        <div class="label">You Pay</div>
                        <div class="input-box">
                            <input type="number" placeholder="0.0">
                            <span class="token">XLM</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="label">You Receive (Estimated)</div>
                        <div class="input-box" style="background: rgba(255,255,255,0.02)">
                            <input type="number" placeholder="0.0" disabled>
                            <span class="token">SFL</span>
                        </div>
                    </div>

                    <button class="btn">CONNECT FREIGHTER WALLET</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
